<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squad Splitter</title>
</head>
<body>
  <h1>Squad Splitter</h1>
  <button id="select-all">Select All</button>
  <button id="deselect-all">Deselect All</button>
  <div id="player-list"></div>
  <button id="split-teams">Split Teams</button>
  <div id="teams-output"></div>

<script>
  // all my players, each one has a name, position and rating
  const players = [
    { name: "Sam Carter",     position: "GK",  rating: 82 },
    { name: "Luis Fernandez", position: "GK",  rating: 75 },
    { name: "Jake Thompson",  position: "DEF", rating: 88 },
    { name: "Marcus Reid",    position: "DEF", rating: 79 },
    { name: "Tom Brennan",    position: "DEF", rating: 84 },
    { name: "Chris Okafor",   position: "DEF", rating: 71 },
    { name: "Nico Bauer",     position: "DEF", rating: 77 },
    { name: "Rafi Santos",    position: "DEF", rating: 68 },
    { name: "Daniel Park",    position: "MID", rating: 91 },
    { name: "Leo Marchetti",  position: "MID", rating: 86 },
    { name: "Ethan Cole",     position: "MID", rating: 83 },
    { name: "Ivan Petrov",    position: "MID", rating: 78 },
    { name: "Omar Diallo",    position: "MID", rating: 74 },
    { name: "Harry Walsh",    position: "MID", rating: 80 },
    { name: "Yusuf Celik",    position: "MID", rating: 69 },
    { name: "Ben Kowalski",   position: "MID", rating: 72 },
    { name: "Andres Vega",    position: "FWD", rating: 93 },
    { name: "Callum Shaw",    position: "FWD", rating: 89 },
    { name: "Mateo Cruz",     position: "FWD", rating: 87 },
    { name: "Joel Asante",    position: "FWD", rating: 81 },
    { name: "Finn Larsen",    position: "FWD", rating: 76 },
    { name: "Pierre Dubois",  position: "FWD", rating: 85 },
    { name: "Kira Novak",     position: "FWD", rating: 70 },
    { name: "Diego Rojas",    position: "FWD", rating: 66 },
    { name: "Tariq Hussain",  position: "FWD", rating: 73 },
  ];

  // tick all checkboxes when select all is clicked
  document.getElementById("select-all").addEventListener("click", () => {
    document.querySelectorAll("#player-list input[type='checkbox']").forEach(cb => cb.checked = true);
  });

  // untick all checkboxes when deselect all is clicked
  document.getElementById("deselect-all").addEventListener("click", () => {
    document.querySelectorAll("#player-list input[type='checkbox']").forEach(cb => cb.checked = false);
  });

  // when split teams is clicked, split the selected players into two balanced teams
  document.getElementById("split-teams").addEventListener("click", () => {
    // get all the ticked checkboxes and look up the matching player from the array
    const checked = document.querySelectorAll("#player-list input[type='checkbox']:checked");
    const selected = Array.from(checked).map(cb => players[parseInt(cb.dataset.index)]);

    if (selected.length < 2) {
      alert("Select at least 2 players to split!");
      return;
    }

    // group players by position so we can balance each position across both teams
    const byPosition = {};
    selected.forEach(p => {
      if (!byPosition[p.position]) byPosition[p.position] = [];
      byPosition[p.position].push(p);
    });

    const teamA = [];
    const teamB = [];

    // for each position group, sort best to worst then snake draft —
    // 1st goes to A, 2nd to B, 3rd to A, etc. keeps ratings balanced within each position.
    // aIsFirst flips whenever a group has an odd count, so if A got the extra player in
    // one group(Def), B gets the extra in the next odd group(Mid) — team sizes stay equal overall
    let aIsFirst = true;
    Object.values(byPosition).forEach(group => {
      group.sort((a, b) => b.rating - a.rating);
      group.forEach((player, i) => {
        const goesToA = aIsFirst ? i % 2 === 0 : i % 2 !== 0;
        if (goesToA) teamA.push(player);
        else teamB.push(player);
      });
      if (group.length % 2 === 1) aIsFirst = !aIsFirst;
    });

    // work out average rating for a team
    const avgRating = team => Math.round(team.reduce((sum, p) => sum + p.rating, 0) / team.length);

    // build the HTML for one team column
    const renderTeam = (team, name) => {
      const rows = team.map(p => `<div>${p.name} — ${p.position} — ${p.rating}</div>`).join("");
      return `<div><h3>${name}</h3><div>Avg rating: ${avgRating(team)}</div>${rows}</div>`;
    };

    // show both columns side by side
    document.getElementById("teams-output").innerHTML = `
      <div style="display:flex; gap:2rem;">
        ${renderTeam(teamA, "Team A")}
        ${renderTeam(teamB, "Team B")}
      </div>
    `;
  });

  // grab the div where the player list goes
  const list = document.getElementById("player-list");

  // loop through each player and add them to the page
  players.forEach((player, index) => {
    // using a label so clicking the text also toggles the checkbox
    const label = document.createElement("label");
    // build the checkbox + player info, storing the index so i know which player it is later
    label.innerHTML = `<input type="checkbox" data-index="${index}"> ${player.name} — ${player.position} — ${player.rating}`;
    list.appendChild(label);
    list.appendChild(document.createElement("br")); // new line after each player
  });
</script>
</body>
</html>
